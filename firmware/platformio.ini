[env:xiao-esp32s3]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino
monitor_speed = 115200
lib_deps =
  h2zero/NimBLE-Arduino @ ^1.4.2
  adafruit/Adafruit MPU6050 @ ^2.2.6
build_flags =
  -DCORE_DEBUG_LEVEL=1
  -DCONFIG_BT_NIMBLE_MSYS1_BLOCK_COUNT=24
  -DARDUINO_USB_CDC_ON_BOOT=1
